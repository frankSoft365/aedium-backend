server:
  port: 8070
spring:
  application:
    name: aedium-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aedium
    username: root
    password: 12345678
  # redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  servlet:
    multipart:
      max-file-size: 5MB
# 登录令牌配置 开发环境 false 只在HTTPS协议下传输
secure:
  cookie: false
# aliyun OSS
aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucketName: java-web-frank
    region: cn-beijing
# 上传头像的配置
avatar:
  upload:
    max-width: 800 # 最大宽度
    max-height: 800 # 最大高度
    quality: 0.7 # 压缩质量（0-1）
# mybatis-plus
mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0
